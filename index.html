<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A private Sanskrit transliteration workspace." />
    <meta name="theme-color" content="#f4f0e8" />
    <title>Akṣarapad</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <a class="brand" href="./" aria-label="Akṣarapad home">
          <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true">
            <g class="lotus-outer">
              <path d="M50 11C42 21 40 31 50 41c10-10 8-20 0-30Z"/><path d="M72 19c-13 2-21 9-22 22 14-3 20-11 22-22Z"/><path d="M88 43c-14-3-24 1-29 12 14 3 24-2 29-12Z"/><path d="M84 68c-13-5-24-2-31 8 14 5 25 1 31-8Z"/><path d="M64 87c-5-13-13-19-25-18 5 13 14 19 25 18Z"/><path d="M36 87c5-13 13-19 25-18-5 13-14 19-25 18Z"/><path d="M16 68c13-5 24-2 31 8-14 5-25 1-31-8Z"/><path d="M12 43c14-3 24 1 29 12-14 3-24-2-29-12Z"/><path d="M28 19c13 2 21 9 22 22-14-3-20-11-22-22Z"/>
            </g>
            <circle cx="50" cy="50" r="24" class="lotus-ring"/>
            <text x="50" y="59" text-anchor="middle">अं</text>
          </svg>
          <span class="brand-copy">
            <span class="brand-name">Akṣarapad</span>
            <span class="brand-subtitle">Sanskrit Transliteration</span>
          </span>
        </a>

        <button id="theme-toggle" class="icon-button" type="button" aria-label="Toggle color theme" title="Toggle color theme">
          <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.5"/><path d="M12 2v2.2M12 19.8V22M4.93 4.93l1.56 1.56M17.51 17.51l1.56 1.56M2 12h2.2M19.8 12H22M4.93 19.07l1.56-1.56M17.51 6.49l1.56-1.56"/></svg>
          <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.6 15.4A8.8 8.8 0 0 1 8.6 3.4 8.8 8.8 0 1 0 20.6 15.4Z"/></svg>
        </button>
      </header>

      <section class="converter" aria-label="Transliteration converter">
        <div class="scheme-bar">
          <label class="scheme-control" for="source-script">
            <span>From</span>
            <select id="source-script">
              <option value="Devanagari">Devanagari</option>
              <option value="IAST">IAST</option>
              <option value="HK">Harvard-Kyoto</option>
              <option value="Itrans">ITRANS</option>
              <option value="Velthuis">Velthuis</option>
            </select>
          </label>

          <button id="swap-button" class="swap-button" type="button" aria-label="Swap input and output schemes" title="Swap (Ctrl + Enter)">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h11m0 0-3-3m3 3-3 3M17 17H6m0 0 3-3m-3 3 3 3"/></svg>
            <span>Swap</span>
          </button>

          <label class="scheme-control scheme-control-output" for="target-script">
            <span>To</span>
            <select id="target-script">
              <option value="Devanagari">Devanagari</option>
              <option value="IAST" selected>IAST</option>
              <option value="HK">Harvard-Kyoto</option>
              <option value="Itrans">ITRANS</option>
              <option value="Velthuis">Velthuis</option>
            </select>
          </label>
        </div>

        <div class="panels" id="panels">
          <section class="text-panel" aria-labelledby="input-heading">
            <div class="panel-heading">
              <h1 id="input-heading">Input</h1>
              <span id="input-count" class="character-count">0 characters</span>
            </div>
            <textarea id="input-text" lang="sa" spellcheck="false" autofocus placeholder="Type or paste Sanskrit text here…"></textarea>
            <div class="panel-actions">
              <button id="clear-button" class="text-button" type="button">Clear</button>
            </div>
          </section>

          <section class="text-panel output-panel" aria-labelledby="output-heading">
            <div class="panel-heading">
              <h1 id="output-heading">Output</h1>
              <span id="engine-status" class="engine-status" role="status">Starting engine…</span>
            </div>
            <textarea id="output-text" lang="sa" spellcheck="false" readonly aria-label="Converted text" placeholder="The conversion will appear here."></textarea>
            <div class="panel-actions">
              <button id="copy-button" class="text-button" type="button">Copy</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span>Akṣarapad</span>
      <span class="footer-rule" aria-hidden="true"></span>
      <nav aria-label="Project links">
        <a href="https://github.com/virtualvinodh/aksharamukha" target="_blank" rel="noreferrer">Aksharamukha Engine</a>
        <a href="https://github.com/virtualvinodh/aksharamukha/blob/master/LICENSE" target="_blank" rel="noreferrer">MIT License</a>
        <a href="https://github.com/oleandrum/aksharapad" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
    </footer>

    <script src="vendor/aksharamukha/dist/index.global.js"></script>
    <script src="app.js"></script>
  </body>
</html>
