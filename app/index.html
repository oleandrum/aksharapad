<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Aksharapad</title>
<meta name="description" content="Type Sanskrit in Devanagari using IAST, Harvard-Kyoto, ITRANS, or Velthuis — space triggers live conversion.">
<meta name="theme-color" content="#1d1f26">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231d1f26'/%3E%3Crect x='1.5' y='1.5' width='61' height='61' rx='13' fill='none' stroke='%23383b46' stroke-width='2'/%3E%3Ctext x='32' y='45' font-family='Georgia, Times New Roman, serif' font-size='34' font-weight='700' fill='%23cf9a4c' text-anchor='middle'%3E%E0%A4%85%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,650;1,9..144,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600&family=Noto+Sans:ital,wght@0,400;0,500;0,600&family=Tiro+Devanagari+Sanskrit&family=Shobhika:wght@400;700&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:"Tiro Devanagari Sanskrit Full";
    src:url("fonts/TiroDevanagariSanskrit-Regular.ttf") format("truetype");
    font-weight:400;
    font-display:swap;
  }
  :root{
    --ink:#f6f3ea; --surface:#fdfcf8; --surface-raised:#f0ebdd; --hair:#ddd4bf; --hair-soft:#e8e1cf;
    --bone:#2a271f; --bone-dim:#6b6455; --brass:#a9722f; --brass-dim:#8a5d27; --brick:#a24a41; --focus:#8a5d27;
    --shadow: 0 1px 2px rgba(30,24,10,.05), 0 12px 32px -8px rgba(30,24,10,.14);
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme]){
      --ink:#141419; --surface:#1d1f26; --surface-raised:#262832; --hair:#383b46; --hair-soft:#2b2e38;
      --bone:#ede6d6; --bone-dim:#a9a49a; --brass:#cf9a4c; --brass-dim:#9c7a45; --brick:#b3524a; --focus:#e7c988;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 16px 40px -10px rgba(0,0,0,.5);
    }
  }
  :root[data-theme="light"]{
    --ink:#f6f3ea; --surface:#fdfcf8; --surface-raised:#f0ebdd; --hair:#ddd4bf; --hair-soft:#e8e1cf;
    --bone:#2a271f; --bone-dim:#6b6455; --brass:#a9722f; --brass-dim:#8a5d27; --brick:#a24a41; --focus:#8a5d27;
    --shadow: 0 1px 2px rgba(30,24,10,.05), 0 12px 32px -8px rgba(30,24,10,.14);
  }
  :root[data-theme="dark"]{
    --ink:#141419; --surface:#1d1f26; --surface-raised:#262832; --hair:#383b46; --hair-soft:#2b2e38;
    --bone:#ede6d6; --bone-dim:#a9a49a; --brass:#cf9a4c; --brass-dim:#9c7a45; --brick:#b3524a; --focus:#e7c988;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 16px 40px -10px rgba(0,0,0,.5);
  }

  *{box-sizing:border-box;}
  html, body{height:100%;}
  html{transition:background-color .25s ease;}
  @media (prefers-reduced-motion:reduce){ *{animation-duration:.001ms !important; transition-duration:.001ms !important;} }

  body{
    margin:0; background:var(--ink); color:var(--bone); font-family:"Source Serif 4", Georgia, serif;
    line-height:1.5; -webkit-font-smoothing:antialiased; transition:background-color .25s ease, color .25s ease;
    display:flex; align-items:flex-start; justify-content:center; padding:28px;
  }

  a{color:var(--brass);}
  :focus-visible{outline:2px solid var(--focus); outline-offset:2px; border-radius:4px;}

  .app-shell{width:100%; max-width:760px; display:flex; flex-direction:column; gap:14px;}

  .app-titlebar{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .logo-badge{
    width:30px; height:30px; border-radius:9px; background:linear-gradient(160deg, var(--surface-raised), var(--hair-soft));
    border:1px solid var(--hair); display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-family:"Tiro Devanagari Sanskrit Full", "Shobhika", "ITF Devanagari", "Devanagari Sangam MN", "Noto Sans Devanagari", sans-serif; font-weight:700; font-size:17px; color:var(--brass);
  }
  .brand-name{font-family:"Fraunces", serif; font-weight:650; font-size:16.5px; letter-spacing:-.01em;}

  .theme-switch{display:inline-flex; background:var(--surface-raised); border:1px solid var(--hair); border-radius:20px; padding:3px; gap:2px;}
  .theme-switch button{appearance:none; border:none; background:transparent; cursor:pointer; width:26px; height:26px; border-radius:16px; display:flex; align-items:center; justify-content:center; color:var(--bone-dim);}
  .theme-switch button svg{width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}
  .theme-switch button[aria-pressed="true"]{background:var(--brass); color:#1a1509;}
  .theme-switch button:hover:not([aria-pressed="true"]){color:var(--brass);}

  /* ---- Scheme selector ---- */
  .scheme-row{display:flex; flex-wrap:wrap; gap:6px;}
  .scheme-btn{
    appearance:none; border:1px solid var(--hair); background:var(--surface-raised); color:var(--bone-dim);
    font-family:"JetBrains Mono", monospace; font-size:12px; letter-spacing:.03em; padding:8px 14px; border-radius:18px;
    cursor:pointer; transition:color .15s ease, border-color .15s ease, background .15s ease;
  }
  .scheme-btn:hover{border-color:var(--brass-dim); color:var(--brass);}
  .scheme-btn[aria-pressed="true"]{background:var(--brass); color:#1a1509; border-color:var(--brass);}

  /* ---- Composer card ---- */
  .card{background:var(--surface); border:1px solid var(--hair-soft); border-radius:18px; box-shadow:var(--shadow); padding:20px;}
  .field-text-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .field-text-head label{font-family:"JetBrains Mono", monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--bone-dim);}
  .head-actions{display:flex; gap:6px;}
  .icon-btn{
    appearance:none; border:1px solid var(--hair); background:var(--surface-raised); color:var(--bone-dim);
    width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:color .15s ease, border-color .15s ease;
  }
  .icon-btn svg{width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}
  .icon-btn:hover{color:var(--brass); border-color:var(--brass-dim);}
  .icon-btn.copied{color:#5a9e6f; border-color:#5a9e6f;}

  textarea#composer{
    width:100%; height:220px; resize:vertical; font-family:"Tiro Devanagari Sanskrit Full", "Shobhika", "ITF Devanagari", "Devanagari Sangam MN", "Noto Sans Devanagari", "Noto Sans", sans-serif; font-size:19px; line-height:1.9;
    color:var(--bone); background:var(--surface-raised); border:1px solid var(--hair); border-radius:11px; padding:14px 16px;
    transition:border-color .15s ease; -webkit-user-select:auto; user-select:auto;
  }
  textarea#composer:focus{border-color:var(--brass-dim);}
  textarea#composer::placeholder{color:var(--bone-dim); opacity:.7; font-family:"Source Serif 4", serif; font-size:15px;}
  textarea#composer:disabled{opacity:.6;}

  .status{
    margin-top:10px; font-family:"JetBrains Mono", monospace; font-size:11.5px; color:var(--bone-dim);
    display:flex; align-items:center; gap:8px; min-height:15px;
  }
  .status .spinner{width:11px; height:11px; border-radius:50%; border:2px solid var(--hair); border-top-color:var(--brass); animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .status.error{color:var(--brick);}

  /* ---- Toggle sections (special chars / keyboard mapping) ---- */
  .toggle-row{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .toggle-btn{
    appearance:none; border:1px solid var(--hair); background:var(--surface-raised); color:var(--bone);
    font-family:"JetBrains Mono", monospace; font-size:11.5px; padding:8px 14px; border-radius:18px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px; transition:border-color .15s ease, color .15s ease;
  }
  .toggle-btn:hover{border-color:var(--brass-dim); color:var(--brass);}
  .toggle-btn[aria-expanded="true"]{color:var(--brass); border-color:var(--brass-dim);}
  .toggle-btn svg{width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:transform .2s ease;}
  .toggle-btn[aria-expanded="true"] svg{transform:rotate(180deg);}

  .panel-section{
    margin-top:10px; background:var(--surface); border:1px solid var(--hair-soft); border-radius:14px;
    padding:16px; display:none;
  }
  .panel-section.open{display:block;}

  /* Special characters grid */
  .grid-section-title{font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--bone-dim); margin:14px 0 8px;}
  .grid-section-title:first-child{margin-top:0;}
  .special-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(38px, 1fr)); gap:5px;}
  .special-btn{
    appearance:none; border:1px solid var(--hair); background:var(--surface-raised); color:var(--bone);
    font-family:"Tiro Devanagari Sanskrit Full", "Shobhika", "ITF Devanagari", "Devanagari Sangam MN", "Noto Sans Devanagari", sans-serif; font-size:16px; height:38px; border-radius:8px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:border-color .15s ease, background .15s ease;
  }
  .special-btn:hover{border-color:var(--brass-dim); background:var(--hair-soft);}

  /* Keyboard mapping table */
  .mapping-table{width:100%; border-collapse:collapse; font-family:"Noto Sans", "Tiro Devanagari Sanskrit Full", "Shobhika", "ITF Devanagari", "Devanagari Sangam MN", "Noto Sans Devanagari", sans-serif; font-size:13px;}
  .mapping-table caption{text-align:left; font-family:"Fraunces", serif; font-weight:650; font-size:13.5px; color:var(--bone-dim); margin-bottom:6px;}
  .mapping-table td{padding:6px 8px; border-bottom:1px solid var(--hair-soft); text-align:center;}
  .mapping-table td.latin{font-family:"JetBrains Mono", monospace; color:var(--brass); font-size:12px;}
  .mapping-table td.deva{font-size:16px; color:var(--bone);}
  .mapping-section-title{font-family:"Fraunces", serif; font-weight:650; font-size:13px; color:var(--bone-dim); margin:16px 0 6px;}
  .mapping-section-title:first-child{margin-top:0;}
  .mapping-scroll{overflow-x:auto;}

  .app-footer{text-align:center; font-family:"JetBrains Mono", monospace; font-size:10.5px; color:var(--bone-dim); opacity:.75; margin-top:2px;}
  .app-footer a{color:inherit; text-decoration:underline; text-decoration-color:var(--hair);}
</style>
</head>
<body>

<div class="app-shell">
  <div class="app-titlebar">
    <div class="brand">
      <span class="logo-badge">&#2309;</span>
      <span class="brand-name">Aksharapad</span>
    </div>
    <div class="theme-switch" role="group" aria-label="Theme">
      <button type="button" data-theme-choice="system" aria-label="System theme" aria-pressed="true">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </button>
      <button type="button" data-theme-choice="light" aria-label="Light theme" aria-pressed="false">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.4 4.4l1.7 1.7M17.9 17.9l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.4 19.6l1.7-1.7M17.9 6.1l1.7-1.7"/></svg>
      </button>
      <button type="button" data-theme-choice="dark" aria-label="Dark theme" aria-pressed="false">
        <svg viewBox="0 0 24 24"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"/></svg>
      </button>
    </div>
  </div>

  <div class="scheme-row" role="group" aria-label="Keyboard scheme">
    <button type="button" class="scheme-btn" data-scheme="IAST" aria-pressed="true">IAST</button>
    <button type="button" class="scheme-btn" data-scheme="HK" aria-pressed="false">HK</button>
    <button type="button" class="scheme-btn" data-scheme="Itrans" aria-pressed="false">ITRANS</button>
    <button type="button" class="scheme-btn" data-scheme="Velthuis" aria-pressed="false">Velthuis</button>
  </div>

  <div class="card">
    <div class="field-text-head">
      <label for="composer">Type here — space converts</label>
      <div class="head-actions">
        <button type="button" class="icon-btn" id="clearBtn" title="Clear" aria-label="Clear text">
          <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13M10 11v6M14 11v6"/></svg>
        </button>
        <button type="button" class="icon-btn" id="copyBtn" title="Copy text" aria-label="Copy text">
          <svg viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V5a1 1 0 0 0-1-1H5a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/></svg>
        </button>
      </div>
    </div>
    <textarea id="composer" placeholder="Loading engine…" disabled></textarea>
    <p class="status" id="statusEl"><span class="spinner"></span> Loading transliteration engine…</p>

    <div class="toggle-row">
      <button type="button" class="toggle-btn" id="specialToggle" aria-expanded="false" aria-controls="specialPanel">
        Insert special characters <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>

    <div class="panel-section" id="specialPanel">
      <div class="grid-section-title">Cantillation marks (Sāmaveda)</div>
      <div class="special-grid" id="cantillationGrid"></div>
      <div class="grid-section-title">Vedic accents &amp; signs</div>
      <div class="special-grid" id="vedicAccentGrid"></div>
      <div class="grid-section-title">Combining diacritics (Latin/IAST)</div>
      <div class="special-grid" id="latinCombiningGrid"></div>
    </div>
  </div>

  <p class="app-footer">Powered by <a href="https://github.com/virtualvinodh/aksharamukha-python" target="_blank" rel="noopener">Aksharamukha</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/aksharamukha@latest/dist/index.global.js"></script>
<script src="ime.js"></script>

</body>
</html>
